[Daemon]
AutomaticUpdatePolicy=none
# rpm-ostree 提供的后台自动下载并 stage 新镜像能力。我们希望使用使用 bootc 逻辑进行更新。

##########
# NOTE: There are plans to set to true by default in the future
#
# Set this to false to enable local layering with dnf
# This is an unsupported configuration that can lead to upgrade isses
# Be careful when setting this to true
#
# See [future link] for more information
##########
# LockLayering=false：允许用户通过 rpm-ostree install 手动安装本地包。
# LockLayering=false
